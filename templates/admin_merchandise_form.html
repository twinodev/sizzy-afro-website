{% extends "base.html" %}

{% block title %}{% if product %}Edit{% else %}Add{% endif %} Product - Admin{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
  <h1 class="text-4xl font-black mb-8 text-afro-200">{% if product %}Edit{% else %}Add{% endif %} Product</h1>

  <form method="POST" enctype="multipart/form-data" class="card-soft space-y-6">
    <div>
      <label for="name" class="block text-sm font-semibold text-afro-200 mb-2">Product Name *</label>
      <input type="text" id="name" name="name" required value="{{ product.name if product else '' }}" class="w-full px-4 py-3 rounded-lg bg-white/5 border border-white/10 text-white focus:outline-none focus:ring-2 focus:ring-afro-500">
    </div>

    <div>
      <label for="price" class="block text-sm font-semibold text-afro-200 mb-2">Price *</label>
      <input type="text" id="price" name="price" required value="{{ product.price if product else '' }}" placeholder="e.g., $19.99" class="w-full px-4 py-3 rounded-lg bg-white/5 border border-white/10 text-white focus:outline-none focus:ring-2 focus:ring-afro-500">
    </div>

    <div>
      <label for="description" class="block text-sm font-semibold text-afro-200 mb-2">Description</label>
      <textarea id="description" name="description" rows="4" class="w-full px-4 py-3 rounded-lg bg-white/5 border border-white/10 text-white focus:outline-none focus:ring-2 focus:ring-afro-500">{{ product.description if product else '' }}</textarea>
    </div>

    <div>
      <label for="category" class="block text-sm font-semibold text-afro-200 mb-2">Category</label>
      <input type="text" id="category" name="category" value="{{ product.category if product else '' }}" class="w-full px-4 py-3 rounded-lg bg-white/5 border border-white/10 text-white focus:outline-none focus:ring-2 focus:ring-afro-500">
    </div>

    <div>
      <label for="image_file" class="block text-sm font-semibold text-afro-200 mb-2">{% if product %}Replace {% endif %}Product Image</label>
      <input type="file" id="image_file" name="image_file" accept="image/*" class="w-full px-4 py-3 rounded-lg bg-white/5 border border-white/10 text-white focus:outline-none focus:ring-2 focus:ring-afro-500 file:bg-afro-500 file:text-white file:border-0 file:rounded file:px-4 file:py-2 file:font-semibold file:cursor-pointer">
      {% if product and product.image_url %}
      <p class="text-sm text-afro-100/60 mt-2">Current: <a href="{{ product.image_url }}" target="_blank" rel="noopener noreferrer" class="text-afro-400 hover:underline">View</a></p>
      {% endif %}
    </div>

    <div>
      <label for="purchase_url" class="block text-sm font-semibold text-afro-200 mb-2">Purchase Link (e.g., Shopify, Etsy)</label>
      <input type="url" id="purchase_url" name="purchase_url" value="{{ product.purchase_url if product else '' }}" placeholder="https://example.com/product" class="w-full px-4 py-3 rounded-lg bg-white/5 border border-white/10 text-white focus:outline-none focus:ring-2 focus:ring-afro-500">
    </div>

    <label class="flex items-center gap-3 cursor-pointer">
      <input type="checkbox" name="available" {% if product and product.available or not product %}checked{% endif %} class="w-5 h-5 rounded bg-white/5 border border-white/10 accent-afro-500">
      <span class="font-semibold text-afro-200">Available for Sale</span>
    </label>

    <label class="flex items-center gap-3 cursor-pointer">
      <input type="checkbox" name="featured" {% if product and product.featured %}checked{% endif %} class="w-5 h-5 rounded bg-white/5 border border-white/10 accent-afro-500">
      <span class="font-semibold text-afro-200">Mark as Featured</span>
    </label>

    <div class="flex gap-4">
      <button type="submit" class="px-6 py-3 bg-afro-500 hover:bg-afro-600 text-white font-semibold rounded-lg transition-colors">Save</button>
      <a href="{{ url_for('admin_merchandise') }}" class="px-6 py-3 bg-white/10 hover:bg-white/20 text-white font-semibold rounded-lg transition-colors">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
