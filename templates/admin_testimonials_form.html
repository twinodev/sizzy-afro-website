{% extends "base.html" %}

{% block title %}{% if testimonial %}Edit{% else %}Create{% endif %} Testimonial — Admin{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-12 sm:py-16">
  <h1 class="text-3xl sm:text-4xl font-bold text-white mb-8">
    {% if testimonial %}Edit Testimonial{% else %}New Testimonial{% endif %}
  </h1>

  <form method="POST" class="card space-y-6">
    <div>
      <label class="block text-sm font-semibold text-afro-100 mb-2">Name *</label>
      <input type="text" name="name" value="{{ testimonial.name if testimonial else '' }}" required
             class="w-full px-4 py-2 bg-white/5 border border-white/10 rounded-lg text-white placeholder-afro-100/40 focus:outline-none focus:border-afro-300" />
    </div>

    <div>
      <label class="block text-sm font-semibold text-afro-100 mb-2">Title/Role (optional)</label>
      <input type="text" name="title" value="{{ testimonial.title if testimonial else '' }}"
             class="w-full px-4 py-2 bg-white/5 border border-white/10 rounded-lg text-white placeholder-afro-100/40 focus:outline-none focus:border-afro-300"
             placeholder="e.g., Dancer, Student, Performer" />
    </div>

    <div>
      <label class="block text-sm font-semibold text-afro-100 mb-2">Message *</label>
      <textarea name="message" required rows="6"
                class="w-full px-4 py-2 bg-white/5 border border-white/10 rounded-lg text-white placeholder-afro-100/40 focus:outline-none focus:border-afro-300 resize-none">{{ testimonial.message if testimonial else '' }}</textarea>
    </div>

    <div>
      <label class="block text-sm font-semibold text-afro-100 mb-2">Event (optional)</label>
      <select name="event_id"
              class="w-full px-4 py-2 bg-white/5 border border-white/10 rounded-lg text-white focus:outline-none focus:border-afro-300">
        <option value="">-- No Event --</option>
        {% for event in events %}
          <option value="{{ event.id }}" {% if testimonial and testimonial.event_id == event.id %}selected{% endif %}>
            {{ event.title }} ({{ event.event_date }})
          </option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label class="flex items-center gap-3 cursor-pointer">
        <input type="checkbox" name="published" {% if not testimonial or testimonial.published %}checked{% endif %}
               class="w-4 h-4 rounded border-white/10 bg-white/5 checked:bg-afro-500 checked:border-afro-500" />
        <span class="text-sm font-semibold text-afro-100">Published</span>
      </label>
    </div>

    <div class="flex gap-3 pt-4">
      <button type="submit" class="btn-primary">
        {% if testimonial %}Save Changes{% else %}Create Testimonial{% endif %}
      </button>
      <a href="{{ url_for('admin_testimonials') }}" class="btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
