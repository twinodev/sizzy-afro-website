{% extends "base.html" %}

{% block title %}{% if faq %}Edit{% else %}Add{% endif %} FAQ - Admin{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
  <h1 class="text-4xl font-black mb-8 text-afro-200">{% if faq %}Edit{% else %}Add{% endif %} FAQ</h1>

  <form method="POST" class="card-soft space-y-6">
    <div>
      <label for="question" class="block text-sm font-semibold text-afro-200 mb-2">Question *</label>
      <input type="text" id="question" name="question" required value="{{ faq.question if faq else '' }}" class="w-full px-4 py-3 rounded-lg bg-white/5 border border-white/10 text-white focus:outline-none focus:ring-2 focus:ring-afro-500">
    </div>

    <div>
      <label for="answer" class="block text-sm font-semibold text-afro-200 mb-2">Answer *</label>
      <textarea id="answer" name="answer" required rows="6" class="w-full px-4 py-3 rounded-lg bg-white/5 border border-white/10 text-white focus:outline-none focus:ring-2 focus:ring-afro-500">{{ faq.answer if faq else '' }}</textarea>
    </div>

    <div>
      <label for="category" class="block text-sm font-semibold text-afro-200 mb-2">Category</label>
      <input type="text" id="category" name="category" value="{{ faq.category if faq else '' }}" class="w-full px-4 py-3 rounded-lg bg-white/5 border border-white/10 text-white focus:outline-none focus:ring-2 focus:ring-afro-500">
    </div>

    <div>
      <label for="order" class="block text-sm font-semibold text-afro-200 mb-2">Display Order</label>
      <input type="number" id="order" name="order" value="{{ faq.order if faq else 0 }}" class="w-full px-4 py-3 rounded-lg bg-white/5 border border-white/10 text-white focus:outline-none focus:ring-2 focus:ring-afro-500">
    </div>

    <div class="flex gap-4">
      <button type="submit" class="px-6 py-3 bg-afro-500 hover:bg-afro-600 text-white font-semibold rounded-lg transition-colors">Save</button>
      <a href="{{ url_for('admin_faqs') }}" class="px-6 py-3 bg-white/10 hover:bg-white/20 text-white font-semibold rounded-lg transition-colors">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
