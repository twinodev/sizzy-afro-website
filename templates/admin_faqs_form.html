{% extends "base.html" %}

{% block title %}{% if faq %}Edit{% else %}Create{% endif %} FAQ — Admin{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-12 sm:py-16">
  <h1 class="text-3xl sm:text-4xl font-bold text-white mb-8">
    {% if faq %}Edit FAQ{% else %}New FAQ{% endif %}
  </h1>

  <form method="POST" class="card space-y-6">
    <div>
      <label class="block text-sm font-semibold text-afro-100 mb-2">Question *</label>
      <input type="text" name="question" value="{{ faq.question if faq else '' }}" required
             class="w-full px-4 py-2 bg-white/5 border border-white/10 rounded-lg text-white placeholder-afro-100/40 focus:outline-none focus:border-afro-300" />
    </div>

    <div>
      <label class="block text-sm font-semibold text-afro-100 mb-2">Answer *</label>
      <textarea name="answer" required rows="6"
                class="w-full px-4 py-2 bg-white/5 border border-white/10 rounded-lg text-white placeholder-afro-100/40 focus:outline-none focus:border-afro-300 resize-none">{{ faq.answer if faq else '' }}</textarea>
    </div>

    <div>
      <label class="block text-sm font-semibold text-afro-100 mb-2">Event (optional)</label>
      <select name="event_id"
              class="w-full px-4 py-2 bg-white/5 border border-white/10 rounded-lg text-white focus:outline-none focus:border-afro-300">
        <option value="">-- No Event --</option>
        {% for event in events %}
          <option value="{{ event.id }}" {% if faq and faq.event_id == event.id %}selected{% endif %}>
            {{ event.title }} ({{ event.event_date }})
          </option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label class="block text-sm font-semibold text-afro-100 mb-2">Display Order</label>
      <input type="number" name="order" value="{{ faq.order if faq else 0 }}"
             class="w-full px-4 py-2 bg-white/5 border border-white/10 rounded-lg text-white focus:outline-none focus:border-afro-300" />
    </div>

    <div class="flex gap-3 pt-4">
      <button type="submit" class="btn-primary">
        {% if faq %}Save Changes{% else %}Create FAQ{% endif %}
      </button>
      <a href="{{ url_for('admin_faqs') }}" class="btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
