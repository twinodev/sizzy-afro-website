{% extends "base.html" %}

{% block title %}{% if video %}Edit{% else %}Create{% endif %} Video — Admin{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-12 sm:py-16">
  <h1 class="text-3xl sm:text-4xl font-bold text-white mb-8">
    {% if video %}Edit Video{% else %}New Video{% endif %}
  </h1>

  <form method="POST" class="card space-y-6">
    <div>
      <label class="block text-sm font-semibold text-afro-100 mb-2">Title *</label>
      <input type="text" name="title" value="{{ video.title if video else '' }}" required
             class="w-full px-4 py-2 bg-white/5 border border-white/10 rounded-lg text-white placeholder-afro-100/40 focus:outline-none focus:border-afro-300" />
    </div>

    <div>
      <label class="block text-sm font-semibold text-afro-100 mb-2">Video URL *</label>
      <input type="url" name="url" value="{{ video.url if video else '' }}" required
             class="w-full px-4 py-2 bg-white/5 border border-white/10 rounded-lg text-white placeholder-afro-100/40 focus:outline-none focus:border-afro-300"
             placeholder="https://www.youtube.com/embed/... or https://vimeo.com/..." />
      <p class="text-xs text-afro-100/60 mt-2">YouTube embed: https://www.youtube.com/embed/VIDEO_ID</p>
    </div>

    <div>
      <label class="block text-sm font-semibold text-afro-100 mb-2">Thumbnail URL (optional)</label>
      <input type="url" name="thumbnail_url" value="{{ video.thumbnail_url if video else '' }}"
             class="w-full px-4 py-2 bg-white/5 border border-white/10 rounded-lg text-white placeholder-afro-100/40 focus:outline-none focus:border-afro-300"
             placeholder="https://example.com/thumbnail.jpg" />
    </div>

    <div>
      <label class="block text-sm font-semibold text-afro-100 mb-2">Description (optional)</label>
      <textarea name="description" rows="4"
                class="w-full px-4 py-2 bg-white/5 border border-white/10 rounded-lg text-white placeholder-afro-100/40 focus:outline-none focus:border-afro-300 resize-none">{{ video.description if video else '' }}</textarea>
    </div>

    <div>
      <label class="block text-sm font-semibold text-afro-100 mb-2">Event (optional)</label>
      <select name="event_id"
              class="w-full px-4 py-2 bg-white/5 border border-white/10 rounded-lg text-white focus:outline-none focus:border-afro-300">
        <option value="">-- No Event --</option>
        {% for event in events %}
          <option value="{{ event.id }}" {% if video and video.event_id == event.id %}selected{% endif %}>
            {{ event.title }} ({{ event.event_date }})
          </option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label class="flex items-center gap-3 cursor-pointer">
        <input type="checkbox" name="published" {% if not video or video.published %}checked{% endif %}
               class="w-4 h-4 rounded border-white/10 bg-white/5 checked:bg-afro-500 checked:border-afro-500" />
        <span class="text-sm font-semibold text-afro-100">Published</span>
      </label>
    </div>

    <div class="flex gap-3 pt-4">
      <button type="submit" class="btn-primary">
        {% if video %}Save Changes{% else %}Create Video{% endif %}
      </button>
      <a href="{{ url_for('admin_videos') }}" class="btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
