{% extends "base.html" %}

{% block title %}{% if video %}Edit{% else %}Add{% endif %} Video - Admin{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
  <h1 class="text-4xl font-black mb-8 text-afro-200">{% if video %}Edit{% else %}Add{% endif %} Video</h1>

  <form method="POST" class="card-soft space-y-6">
    <div>
      <label for="title" class="block text-sm font-semibold text-afro-200 mb-2">Title *</label>
      <input type="text" id="title" name="title" required value="{{ video.title if video else '' }}" class="w-full px-4 py-3 rounded-lg bg-white/5 border border-white/10 text-white focus:outline-none focus:ring-2 focus:ring-afro-500">
    </div>

    <div>
      <label for="youtube_id" class="block text-sm font-semibold text-afro-200 mb-2">YouTube Video ID *</label>
      <input type="text" id="youtube_id" name="youtube_id" required value="{{ video.youtube_id if video else '' }}" placeholder="e.g., dQw4w9WgXcQ" class="w-full px-4 py-3 rounded-lg bg-white/5 border border-white/10 text-white placeholder-white/40 focus:outline-none focus:ring-2 focus:ring-afro-500">
      <p class="text-xs text-afro-100/60 mt-2">Find this in the YouTube URL after v=</p>
    </div>

    <div>
      <label for="description" class="block text-sm font-semibold text-afro-200 mb-2">Description</label>
      <textarea id="description" name="description" rows="4" class="w-full px-4 py-3 rounded-lg bg-white/5 border border-white/10 text-white focus:outline-none focus:ring-2 focus:ring-afro-500">{{ video.description if video else '' }}</textarea>
    </div>

    <div>
      <label for="category" class="block text-sm font-semibold text-afro-200 mb-2">Category</label>
      <input type="text" id="category" name="category" value="{{ video.category if video else '' }}" class="w-full px-4 py-3 rounded-lg bg-white/5 border border-white/10 text-white focus:outline-none focus:ring-2 focus:ring-afro-500">
    </div>

    <label class="flex items-center gap-3 cursor-pointer">
      <input type="checkbox" name="featured" {% if video and video.featured %}checked{% endif %} class="w-5 h-5 rounded bg-white/5 border border-white/10 accent-afro-500">
      <span class="font-semibold text-afro-200">Mark as Featured</span>
    </label>

    <div class="flex gap-4">
      <button type="submit" class="px-6 py-3 bg-afro-500 hover:bg-afro-600 text-white font-semibold rounded-lg transition-colors">Save</button>
      <a href="{{ url_for('admin_videos') }}" class="px-6 py-3 bg-white/10 hover:bg-white/20 text-white font-semibold rounded-lg transition-colors">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
