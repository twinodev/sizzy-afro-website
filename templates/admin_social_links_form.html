{% extends "base.html" %}

{% block title %}{% if link %}Edit{% else %}Add{% endif %} Social Link - Admin{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
  <h1 class="text-4xl font-black mb-8 text-afro-200">{% if link %}Edit{% else %}Add{% endif %} Social Link</h1>

  <form method="POST" class="card-soft space-y-6">
    <div>
      <label for="platform" class="block text-sm font-semibold text-afro-200 mb-2">Platform {% if not link %}*{% endif %}</label>
      <input type="text" id="platform" name="platform" {% if not link %}required{% endif %} value="{{ link.platform if link else '' }}" placeholder="e.g., Instagram, TikTok" class="w-full px-4 py-3 rounded-lg bg-white/5 border border-white/10 text-white focus:outline-none focus:ring-2 focus:ring-afro-500" {% if link %}disabled{% endif %}>
      {% if link %}<input type="hidden" name="platform" value="{{ link.platform }}">{% endif %}
    </div>

    <div>
      <label for="url" class="block text-sm font-semibold text-afro-200 mb-2">URL *</label>
      <input type="url" id="url" name="url" required value="{{ link.url if link else '' }}" placeholder="https://..." class="w-full px-4 py-3 rounded-lg bg-white/5 border border-white/10 text-white focus:outline-none focus:ring-2 focus:ring-afro-500">
    </div>

    <div>
      <label for="display_name" class="block text-sm font-semibold text-afro-200 mb-2">Display Name</label>
      <input type="text" id="display_name" name="display_name" value="{{ link.display_name if link else '' }}" placeholder="e.g., Follow us on Instagram" class="w-full px-4 py-3 rounded-lg bg-white/5 border border-white/10 text-white focus:outline-none focus:ring-2 focus:ring-afro-500">
    </div>

    <div>
      <label for="icon" class="block text-sm font-semibold text-afro-200 mb-2">Icon Class (optional)</label>
      <input type="text" id="icon" name="icon" value="{{ link.icon if link else '' }}" placeholder="e.g., fab fa-instagram" class="w-full px-4 py-3 rounded-lg bg-white/5 border border-white/10 text-white focus:outline-none focus:ring-2 focus:ring-afro-500">
      <p class="text-xs text-afro-100/60 mt-2">For Font Awesome icons</p>
    </div>

    <div class="flex gap-4">
      <button type="submit" class="px-6 py-3 bg-afro-500 hover:bg-afro-600 text-white font-semibold rounded-lg transition-colors">Save</button>
      <a href="{{ url_for('admin_social_links') }}" class="px-6 py-3 bg-white/10 hover:bg-white/20 text-white font-semibold rounded-lg transition-colors">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
